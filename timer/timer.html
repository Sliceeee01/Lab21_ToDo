<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Таймер</title>
    <link rel="stylesheet" href="timer.css">
</head>
<body>
    <div class="container">
        <h1>⏱️Timer</h1>
        
        <div class="timer-display" id="timerDisplay">
            00:00:00
        </div>
        
        <div class="buttons">
            <button class="btn btn-start" id="startBtn">▶ Старт</button>
            <button class="btn btn-stop" id="stopBtn">⏸ Стоп</button>
            <button class="btn btn-reset" id="resetBtn">🔄 Сброс</button>
        </div>
        
        <div class="info">
            <p>Часы: <span id="hours">00</span> | Минуты: <span id="minutes">00</span> | Секунды: <span id="seconds">00</span></p>
        </div>
    </div>
    
    <script src="timer.js"></script>
</body>
</html>
